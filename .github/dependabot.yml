version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    groups:
      minor-patch:
        update-types:
          - "patch"
          - "minor"
    schedule:
      interval: "daily"
    cooldown:
     default-days: 1

  - package-ecosystem: "gomod"
    directory: "/"
    groups:
      minor-patch:
        update-types:
          - "patch"
          - "minor"
    schedule:
      interval: "daily"
    cooldown:
     default-days: 1

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
     default-days: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
     default-days: 1
